
name: 🤖 AI Learning Pipeline

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM
  workflow_dispatch:
    inputs:
      learning_mode:
        description: 'Learning mode'
        required: true
        default: 'incremental'
        type: choice
        options:
        - incremental
        - full_retrain
        - evaluation_only
      data_source:
        description: 'Data source for learning'
        required: false
        default: 'production'

env:
  PYTHON_VERSION: '3.9'

jobs:
  collect-feedback:
    runs-on: ubuntu-latest
    outputs:
      has_new_data: ${{ steps.check-data.outputs.has_new_data }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pandas numpy scikit-learn matplotlib seaborn

    - name: Collect user feedback data
      id: collect-feedback
      run: |
        python scripts/collect_feedback.py \
          --source ${{ github.event.inputs.data_source || 'production' }} \
          --output data/feedback/latest_feedback.json

    - name: Check for new learning data
      id: check-data
      run: |
        if [ -f "data/feedback/latest_feedback.json" ] && [ -s "data/feedback/latest_feedback.json" ]; then
          echo "has_new_data=true" >> $GITHUB_OUTPUT
        else
          echo "has_new_data=false" >> $GITHUB_OUTPUT
        fi

    - name: Upload feedback data
      if: steps.check-data.outputs.has_new_data == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: feedback-data
        path: data/feedback/

  analyze-performance:
    needs: collect-feedback
    if: needs.collect-feedback.outputs.has_new_data == 'true'
    runs-on: ubuntu-latest
    outputs:
      performance_score: ${{ steps.analyze.outputs.performance_score }}
      needs_retraining: ${{ steps.analyze.outputs.needs_retraining }}

    steps:
    - uses: actions/checkout@v4

    - name: Download feedback data
      uses: actions/download-artifact@v4
      with:
        name: feedback-data
        path: data/feedback/

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Analyze system performance
      id: analyze
      run: |
        python scripts/analyze_performance.py \
          --feedback-data data/feedback/latest_feedback.json \
          --output data/analysis/performance_report.json

        # Extract performance metrics
        SCORE=$(python -c "import json; print(json.load(open('data/analysis/performance_report.json'))['overall_score'])")
        NEEDS_RETRAIN=$(python -c "import json; print('true' if json.load(open('data/analysis/performance_report.json'))['needs_retraining'] else 'false')")

        echo "performance_score=$SCORE" >> $GITHUB_OUTPUT
        echo "needs_retraining=$NEEDS_RETRAIN" >> $GITHUB_OUTPUT

    - name: Generate performance visualization
      run: |
        python scripts/visualize_performance.py \
          --data data/analysis/performance_report.json \
          --output data/visualizations/performance_trends.png

    - name: Upload analysis results
      uses: actions/upload-artifact@v4
      with:
        name: performance-analysis
        path: |
          data/analysis/
          data/visualizations/

  retrain-models:
    needs: [collect-feedback, analyze-performance]
    if: needs.analyze-performance.outputs.needs_retraining == 'true' || github.event.inputs.learning_mode == 'full_retrain'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: feedback-data
        path: data/feedback/

    - name: Download analysis
      uses: actions/download-artifact@v4
      with:
        name: performance-analysis
        path: data/analysis/

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install ML dependencies
      run: |
        pip install -r requirements.txt
        pip install torch transformers scikit-learn joblib

    - name: Retrain job matching model
      run: |
        python scripts/retrain_job_matcher.py \
          --feedback-data data/feedback/latest_feedback.json \
          --mode ${{ github.event.inputs.learning_mode || 'incremental' }} \
          --output models/job_matcher_v$(date +%Y%m%d).pkl

    - name: Retrain user preference model
      run: |
        python scripts/retrain_user_model.py \
          --feedback-data data/feedback/latest_feedback.json \
          --mode ${{ github.event.inputs.learning_mode || 'incremental' }} \
          --output models/user_model_v$(date +%Y%m%d).pkl

    - name: Validate new models
      id: validate
      run: |
        python scripts/validate_models.py \
          --job-matcher models/job_matcher_v$(date +%Y%m%d).pkl \
          --user-model models/user_model_v$(date +%Y%m%d).pkl \
          --test-data data/feedback/latest_feedback.json \
          --output data/validation/model_validation.json

        # Check if validation passed
        VALIDATION_PASSED=$(python -c "import json; print('true' if json.load(open('data/validation/model_validation.json'))['validation_passed'] else 'false')")
        echo "validation_passed=$VALIDATION_PASSED" >> $GITHUB_OUTPUT

    - name: Upload new models
      if: steps.validate.outputs.validation_passed == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: retrained-models
        path: models/

  update-system:
    needs: [retrain-models]
    if: always() && needs.retrain-models.result == 'success'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Download new models
      uses: actions/download-artifact@v4
      with:
        name: retrained-models
        path: models/

    - name: Update model references
      run: |
        python scripts/update_model_references.py \
          --models-dir models/ \
          --config-file src/config/model_config.json

    - name: Update system configuration
      run: |
        python scripts/update_system_config.py \
          --performance-data data/analysis/performance_report.json \
          --config-file config/settings.json

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "AI Learning Bot"
        git add models/ src/config/ config/
        git commit -m "🤖 Auto-update: New AI models and configuration ($(date))" || exit 0
        git push

  deploy-updates:
    needs: [update-system]
    if: always() && needs.update-system.result == 'success'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to staging
      run: |
        echo "Deploying updated system to staging environment..."
        # Add your deployment commands here

    - name: Run integration tests
      run: |
        python -m pytest tests/integration/ -v

    - name: Deploy to production
      if: success()
      run: |
        echo "Deploying to production environment..."
        # Add production deployment commands here

  notify-results:
    needs: [collect-feedback, analyze-performance, retrain-models, update-system, deploy-updates]
    if: always()
    runs-on: ubuntu-latest

    steps:
    - name: Create learning report
      run: |
        cat > learning_report.md << EOF
        # 🤖 AI Learning Pipeline Report

        **Date**: $(date)
        **Trigger**: ${{ github.event_name }}

        ## Results Summary
        - **Feedback Collection**: ${{ needs.collect-feedback.result }}
        - **Performance Analysis**: ${{ needs.analyze-performance.result }}
        - **Model Retraining**: ${{ needs.retrain-models.result }}
        - **System Update**: ${{ needs.update-system.result }}
        - **Deployment**: ${{ needs.deploy-updates.result }}

        ## Performance Metrics
        - **Current Score**: ${{ needs.analyze-performance.outputs.performance_score || 'N/A' }}
        - **Retraining Needed**: ${{ needs.analyze-performance.outputs.needs_retraining || 'N/A' }}

        ## Next Steps
        - Monitor system performance
        - Collect user feedback
        - Schedule next learning cycle
        EOF

    - name: Create issue with report
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('learning_report.md', 'utf8');

          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `🤖 AI Learning Report - ${new Date().toISOString().split('T')[0]}`,
            body: report,
            labels: ['ai-learning', 'automated', 'report']
          });
