name: ✅ Ultra Simple Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Simple echo test
      run: echo "Hello World! GitHub Actions is working!"

    - name: Show environment
      run: |
        echo "Current directory: $(pwd)"
        echo "User: $(whoami)"
        echo "Date: $(date)"

    - name: Success message
      run: echo "✅ Test completed successfully!"
